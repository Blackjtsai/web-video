<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旅遊影片集</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      background: #0a1628;
      color: #e8f4fd;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 40px 20px;
    }
    h1 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 700; letter-spacing: .06em; opacity: .9; }
    .grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
    .card {
      background: #0d1b2a;
      border: 1px solid rgba(79,195,247,.18);
      border-radius: 16px;
      padding: 28px 32px;
      width: 280px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color .2s, transform .2s;
      text-decoration: none;
      color: inherit;
    }
    .card:hover { border-color: rgba(79,195,247,.5); transform: translateY(-3px); }
    .card-tag { font-size: .7rem; letter-spacing: .12em; opacity: .5; text-transform: uppercase; }
    .card-title { font-size: 1.1rem; font-weight: 700; }
    .card-meta { font-size: .8rem; opacity: .55; }
    .card-links { display: flex; gap: 10px; margin-top: 4px; }
    .btn {
      font-size: .75rem;
      padding: 6px 14px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      letter-spacing: .04em;
    }
    .btn-primary { background: rgba(79,195,247,.15); color: #4fc3f7; border: 1px solid rgba(79,195,247,.3); }
    .btn-secondary { background: rgba(255,255,255,.06); color: #b8d8f0; border: 1px solid rgba(255,255,255,.1); }
    .btn:hover { opacity: .8; }
    footer { font-size: .72rem; opacity: .3; }
  </style>
</head>
<body>
  <h1>🎬 旅遊影片集</h1>

  <div class="grid">
    <div class="card">
      <div class="card-tag">2026 · 05</div>
      <div class="card-title">澎湖四日遊</div>
      <div class="card-meta">6 章 · 31 步 · 九人家族</div>
      <div class="card-links">
        <a class="btn btn-primary" href="penghu/">網頁版</a>
        <a class="btn btn-secondary" href="penghu/?layout=mobile">手機版</a>
      </div>
    </div>

    <div class="card">
      <div class="card-tag">2026 · 12</div>
      <div class="card-title">仙台五日遊</div>
      <div class="card-meta">7 章 · 34 步 · 三位型男雪季自駕</div>
      <div class="card-links">
        <a class="btn btn-primary" href="sendai/">網頁版</a>
        <a class="btn btn-secondary" href="sendai/?layout=mobile">手機版</a>
      </div>
    </div>
  </div>

  <footer>web-video-presentation · blackjtsai</footer>
</body>
</html>
