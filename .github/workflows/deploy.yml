name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build 澎湖
        run: |
          cd "site/20260528澎湖四日遊/src"
          npm install
          VITE_BASE=/web-video/penghu/ npm run build

      - name: Build 仙台
        run: |
          cd "site/20261220仙台/src"
          npm install
          VITE_BASE=/web-video/sendai/ npm run build

      - name: Build 北海道
        run: |
          cd "site/20261006北海道八日遊/src"
          npm install
          VITE_BASE=/web-video/hokkaido/ npm run build

      - name: Assemble dist
        run: |
          mkdir -p dist/penghu dist/sendai dist/hokkaido
          cp -r "site/20260528澎湖四日遊/src/dist/." dist/penghu/
          cp -r "site/20261220仙台/src/dist/." dist/sendai/
          cp -r "site/20261006北海道八日遊/src/dist/." dist/hokkaido/
          cp index.html dist/index.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
